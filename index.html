<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movieverse</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- header -->
        <header class="navbar">
            <h1 class="logo">MovieVerse</h1>
            <input type="text" name="movie" placeholder="search movies">
            <button type="submit">Search</button>


            <button type="button" class="toggle-button">☀️</button>
        </header>

        <section class="genre">
            <span><button>All</button></span>
            <span><button>Adventure</button></span>
            <span><button>Action</button></span>
            <span><button>Romance</button></span>
            <span><button>Comedy</button></span>
            <span><button>Drama</button></span>
            <span><button>Fantasy</button></span>
            <span><button>Horror</button></span>
            <span><button>Sci-fi</button></span>
        </section>


        <!-- hero -->
         <main>
            <div class="movie-container">
                
            </div>
        
         </main>
         <footer>
            <p>© 2026 MovieVerse</p>
            <p>Made with ❤️ by Niraj</p>
         </footer>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
