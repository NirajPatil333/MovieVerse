<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movieverse</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- header -->
    <header>
        <div class="navbar">
            <h1 class="logo">MovieVerse</h1>
            <div class="search-container">
                <img src="assets/icons/search.svg" alt="search-icon" class="search-icon">
                <input id="search-input" type="text" name="movie" placeholder="Search for movies, TV shows...">
            </div>

            <button type="button" class="toggle-button">☀️</button>
        </div>
        
        <section>
            <div class="genres">
                <button class="genres-btn" data-id="all"="">All</button>
                <button class="genres-btn" data-id="28">Action</button>
                <button class="genres-btn" data-id="12">Adventure</button>
                <button class="genres-btn" data-id="35">Comedy</button>
                <button class="genres-btn" data-id="80">Crime</button>
                <button class="genres-btn" data-id="18">Drama</button>
                <button class="genres-btn" data-id="14">Fantasy</button>
                <button class="genres-btn" data-id="36">History</button>
                <button class="genres-btn" data-id="27">Horror</button>
                <button class="genres-btn" data-id="10749">Romance</button>
                <button class="genres-btn" data-id="878">Sci-fi</button>
                <button class="genres-btn" data-id="53">Thriller</button>
            </div>
        </section>
    </header>
        
    <!-- hero section -->
    <main>
        <div class="hero">
            <h1>Discover Cinema</h1>
            <p>Search millions of movies, series and episodes from the world's largest film database.</p>
        </div>
    </main>

    <!-- movie card -->
    <section>
        <div id="movie-container">
        </div>
    </section>



    <!-- footer section-->
    <footer>
        
        <p>© 2026 MovieVerse</p>
        <p>Made with ❤️ by Niraj</p>
    </footer>
    <script src="js/app.js"></script>
</body>

</html>
