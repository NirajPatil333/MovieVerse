<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movieverse</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <!-- header -->
    <header>
        <div class="navbar">
            <h1 class="logo">MovieVerse</h1>
            <div class="search-container">
                <img src="assets/icons/search.svg" alt="search-icon" class="search-icon">
                <input id="search-input" type="text" name="movie" placeholder="Search for movies, TV shows...">
                <button id="search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <button type="button" class="toggle-button">☀️</button>
        </div>

        <section>
            <div class="genres">
                <button class="genres-btn" data-id="all"="">All</button>
                <button class="genres-btn" data-id="28">Action</button>
                <button class="genres-btn" data-id="12">Adventure</button>
                <button class="genres-btn" data-id="35">Comedy</button>
                <button class="genres-btn" data-id="80">Crime</button>
                <button class="genres-btn" data-id="18">Drama</button>
                <button class="genres-btn" data-id="14">Fantasy</button>
                <button class="genres-btn" data-id="36">History</button>
                <button class="genres-btn" data-id="27">Horror</button>
                <button class="genres-btn" data-id="10749">Romance</button>
                <button class="genres-btn" data-id="878">Sci-fi</button>
                <button class="genres-btn" data-id="53">Thriller</button>
            </div>
        </section>
    </header>

    <!-- hero section -->
    <main>
        <div class="hero">
            <h1>Discover Cinema</h1>
            <p>Search millions of movies, series and episodes from the world's largest film database.</p>
        </div>
    </main>

    <!-- movie card -->
    <section>
        <div class="loader">
            <div class="spinner"></div>
        </div>
        <div id="movie-container">
        </div>
    </section>

    <!-- no result  -->
    <div class="no-result">
        <div class="no-result-icon">🎬</div>
        <h2> No movies found.</h2>
        <p>Try searching for another movie.</p>
    </div>

    <!-- movie details -->
    <section>
        <div class="modal-overlay">
            <div class="movie-modal">
                <button class="close-btn">&times</button>
                <div class="movie-content">
                    <div class="movie-left">
                        <img src="assets/images/no-poster.jpg" alt=`${data.title}` id="modal-poster">
                    </div>

                    <div class="movie-info">
                        <span id="modal-title"></span>
                        <h3 id="modal-genres"></h3>
                        <h2 style="color: var(--accent-color);" id="modal-rating">⭐8.2 /10</h2>
                        <div class="movie-data">
                            <span><i class="fa-regular fa-calendar"></i> <span id="modal-release"></span></span>
                            <span><i class="fa-solid fa-clock"></i> <span id="modal-runtime"></span></span>
                            <span><i class="fa-solid fa-globe"></i> <span id="modal-language"></span></span>
                        </div>
                        <P id="modal-overview"></P>
                        <h2><i class="fa-solid fa-clapperboard"></i> Director</h2>
                        <p id="modal-director"></p>
                        <h2><i class="fa-solid fa-users"></i> Cast</h2>
                        <p id="modal-cast"></p>

                    </div>
                </div>
            </div>
        </div>
    </section>



    <!-- footer section-->
    <footer>
        <p>© 2026 MovieVerse</p>
        <p>Made with ❤️ by Niraj</p>
    </footer>
    <script src="js/app.js"></script>
</body>

</html>
